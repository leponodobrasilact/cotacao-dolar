name: Atualizar cotação do dólar

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  
permissions: write-all

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Executar script
        run: python main.py

      # --- PASSO QUE ESTAVA FALTANDO ---
      - name: Salvar e Commitar as mudanças no repositório
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          # Adiciona o arquivo gerado pelo seu script (ajuste o nome se for diferente)
          git add dolar.csv 
          # O "|| exit 0" evita que o GitHub dê erro caso a cotação seja exatamente igual e não haja mudanças
          git commit -m "Atualização automática do dólar: $(date +'%Y-%m-%d')" || exit 0
          git push
